 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Modern Calculator</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#2b1055,#7597de);
  font-family: 'Segoe UI', sans-serif;
}

.calculator{
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  padding:30px;
  border-radius:20px;
  width:320px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.display{
  background:rgba(255,255,255,0.15);
  height:80px;
  border-radius:15px;
  padding:15px;
  font-size:32px;
  text-align:right;
  color:white;
  margin-bottom:20px;
  border:none;
  width:100%;
}

.buttons{
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:15px;
}

button{
  height:60px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.15);
  font-size:18px;
  font-weight:600;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:rgba(255,255,255,0.25);
}

.enter{
  grid-column: span 2;
  background:#ff4b5c;
  color:white;
}

.enter:hover{
  background:#e63c4d;
}
</style>
</head>
<body>

<div class="calculator">
  <input class="display" id="display" disabled>

  <div class="buttons" id="buttons">
    <button>(</button>
    <button>)</button>
    <button>del</button>
    <button>clear</button>

    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button>%</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button>*</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button>-</button>

    <button>.</button>
    <button>0</button>
    <button>+</button>
    <button class="enter">ENTER</button>
  </div>
</div>

<script>
const display = document.getElementById("display");
const buttons = document.getElementById("buttons");
let expression = "";

buttons.addEventListener("click", e => {
  if(!e.target.matches("button")) return;
  const value = e.target.textContent;

  if(value === "clear"){
    expression = "";
  } 
  else if(value === "del"){
    expression = expression.slice(0,-1);
  } 
  else if(value === "ENTER"){
    try{
      expression = eval(expression).toString();
    }catch{
      expression = "";
    }
  } 
  else{
    expression += value;
  }

  display.value = expression;
});
</script>

</body>
</html>
